name: Docker CI

on:
  push:
    branches: ["main"]

env:
  IMAGE: diogeneswallis96/load_test_fast_api
  TAG: ${{ github.run_number }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Build image
        run: |
          docker build -f Dockerfile -t $IMAGE:$TAG .

      - name: Save image
        run: docker save $IMAGE:$TAG -o image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar

  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download image
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load image
        run: docker load -i image.tar

      - name: Run model sanity check
        run: |
          docker run --rm \
            -e APP_NAME=ML_Inference_API \
            -e MODEL_PATH=/app/artifacts/_model.joblib \
            -e DATABASE_URL=sqlite:///./test.db \
            -e RECORD_ON_DB=false \
            $IMAGE:$TAG \
            python -m app.tests.sanity_check

  push:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Download image
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load image
        run: docker load -i image.tar

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push image
        run: |
          docker tag $IMAGE:$TAG $IMAGE:latest
          docker push $IMAGE:$TAG
          docker push $IMAGE:latest