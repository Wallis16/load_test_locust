services:
  api:
    image: load_test_fast_api:latest
    container_name: fastapi_uv_app
    restart: unless-stopped
    env_file:
      - .env

  nginx:
    image: nginx:latest
    container_name: nginx_proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - api